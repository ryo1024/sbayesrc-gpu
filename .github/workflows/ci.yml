name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  patch-applies:
    name: Patch applies cleanly against pinned GCTB SHA
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run patch-applies test
        run: tests/test_patch_applies.sh

  compare-pip-nan:
    name: NaN-safe comparePIP survives -ffast-math
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Build under -O3 -ffast-math
        run: g++ -O3 -ffast-math -std=c++17 -o tests/test_compare_pip_nan tests/test_compare_pip_nan.cpp
      - name: Run unit tests
        run: ./tests/test_compare_pip_nan

  shellcheck:
    name: Shellcheck test scripts
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        # Only the test scripts — SLURM scripts pull in cluster-specific env at
        # runtime that shellcheck flags as undefined.
        run: shellcheck tests/*.sh

  docker-build:
    name: Docker image builds end-to-end
    runs-on: ubuntu-22.04
    # Slow (~5-10 min); only run on changes that affect the build.
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'docs/Dockerfile') ||
      contains(toJSON(github.event.commits.*.modified), 'src/')
    steps:
      - uses: actions/checkout@v4
      - name: Build docker image
        env:
          # CI runners have no GPU, but nvcc emits PTX/SASS without one.
          # sm_80 covers A100; PTX from that is forward-compatible to sm_90.
          GPU_ARCH: sm_80
        run: tests/test_docker_build.sh
